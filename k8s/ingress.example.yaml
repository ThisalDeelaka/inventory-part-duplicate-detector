apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inventory-duplicate-ingress
spec:
  rules:
    - host: inventory-duplicate.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: {service: {name: inventory-duplicate-backend, port: {number: 8000}}}
          - path: /health
            pathType: Exact
            backend: {service: {name: inventory-duplicate-backend, port: {number: 8000}}}
          - path: /ready
            pathType: Exact
            backend: {service: {name: inventory-duplicate-backend, port: {number: 8000}}}
          - path: /
            pathType: Prefix
            backend: {service: {name: inventory-duplicate-frontend, port: {number: 80}}}
